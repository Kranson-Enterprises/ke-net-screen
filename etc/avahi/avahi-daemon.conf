# See avahi-daemon.conf(5) for more information on this configuration
# file!

[server]
host-name=IGconf_device_hostname
# domain-name local restricts to only known, local devices
domain-name=local
browse-domains=IGconf_network_domain
use-ipv4=yes
use-ipv6=yes
allow-interfaces=IGconf_network_interface
#deny-interfaces=eth1
check-response-ttl=no
#use-iff-running=no
enable-dbus=yes
disallow-other-stacks=yes
#allow-point-to-point=no
cache-entries-max=4096
clients-max=4096
objects-per-client-max=1024
entries-per-entry-group-max=32
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=yes

[publish]
#disable-publishing=no
#disable-user-service-publishing=no
#add-service-cookie=no
publish-addresses=yes
publish-hinfo=no
publish-workstation=no
publish-domain=yes
publish-dns-servers=IGconf_network_ipaddress
publish-resolv-conf-dns-servers=no
publish-aaaa-on-ipv4=no
publish-a-on-ipv6=no

[reflector]
# testing enable yes for defined filters
enable-reflector=yes
reflect-ipv=yes
reflect-filters=_airplay._tcp.local,_raop._tcp.local,_ipps._tcp.local,_printer._tcp.local,_spotify-connect._tcp.local,_googlecast._tcp.local,_https._tcp.local,_smb.tcp.local

[rlimits]
#rlimit-as=
#rlimit-core=0
#rlimit-data=8388608
#rlimit-fsize=0
#rlimit-nofile=768
#rlimit-stack=8388608
#rlimit-nproc=3
