server:
    # If no logfile is specified, syslog is used
    # logfile: "/var/log/unbound/unbound.log"
    verbosity: 0
    chroot: ""
    module-config: "dns64 validator iterator"
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    # dns64 helps create avahi connections
    do-ip6: yes
    prefer-ip6: no
    #root-hints: "/var/lib/unbound/root.hints"
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: no
    edns-buffer-size: 1232
    prefetch: yes
    num-threads: 1
    msg-cache-size: 4m
    rrset-cache-size: 4m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    # Socket buffer sizes require kernel tuning to take effect.
    so-rcvbuf: 8m
    so-sndbuf: 8m

    ratelimit: 5000
    discard-timeout: 0
    wait-limit: 2000
    ip-ratelimit: 0

    # Rebinding/privacy protection for local and special-use ranges
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 100.64.0.0/10
    private-address: 127.0.0.0/8
    private-address: 198.18.0.0/15
    private-address: 0.0.0.0/8
    private-address: 255.255.255.255/32

    private-address: ::1/128
    private-address: fc00::/7
    private-address: fe80::/10
    private-address: 2001:db8::/32

    # Documentation ranges
    private-address: 192.0.2.0/24
    private-address: 198.51.100.0/24
    private-address: 203.0.113.0/24

    # RFC6303-style reverse leakage protection
    local-zone: "10.in-addr.arpa." static
    local-zone: "16.172.in-addr.arpa." static
    local-zone: "17.172.in-addr.arpa." static
    local-zone: "18.172.in-addr.arpa." static
    local-zone: "19.172.in-addr.arpa." static
    local-zone: "20.172.in-addr.arpa." static
