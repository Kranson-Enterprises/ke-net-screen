device:
  layer: rpi5
  user1: localadmin
  user1pass: $PIHOLE_PASSWORD
  hostname: ke-localdns
  keyboard_layout: us
  locale  : en_US.UTF-8
  timezone: America/Detroit

locale:
  default: en_US.UTF-8
  keyboard_keymap: us
  keyboard_layout: us
  timezone: America/Detroit

image:
  layer: image-rpios
  boot_part_size: $IMAGE_BOOT_PART_SIZE
  root_part_size: $IMAGE_ROOT_PART_SIZE
  name: deb13-arm64-splash

layer:
  base: trixie-minbase
  splash: rpi-splash-screen
  ke: ke-00-layer

ssh:
  pubkey_user1: $SSH_PUBKEY_USER1
  pubkey_only: n

ke:
  environment: development
  debug: true
  name: keapp
  component: frontend

network:
  interface: $NETWORK_INTERFACE
  use_dhcp: $NETWORK_USE_DHCP
  ipaddress: $NETWORK_IPADDRESS
  ipnetmask: $NETWORK_IPNETMASK
  netmask: $NETWORK_NETMASK
  gateway: $NETWORK_GATEWAY
  dns0: $NETWORK_DNS0
  dns1: $NETWORK_DNS1
  dns2: $NETWORK_DNS2
  domain: $NETWORK_DOMAIN

splash:
  # Path to your custom splash screen image (24-bit TGA, max 1920x1080, <224 colours)
  # Leave empty or comment out to skip splash screen installation
  # Can be absolute or relative to the project root
  image_path: ke-splash.tga
  
  # Skip image validation checks (not recommended for production)
  skip_image_checks: n
  
  # Automatically update /boot/firmware/cmdline.txt to enable splash
  update_cmdline: y
