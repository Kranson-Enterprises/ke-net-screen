# METABEGIN
# X-Env-Layer-Name: ke-netcfg
# X-Env-Layer-Desc: Network Configuration
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Category: networking
# X-Env-Layer-Requires: systemd-net-min
# X-Env-VarRequires: IGconf_network_interface
# X-Env-VarRequires: IGconf_network_use_dhcp
# X-Env-VarRequires: IGconf_network_ipaddress
# X-Env-VarRequires: IGconf_network_ipnetmask
# X-Env-VarRequires: IGconf_network_netmask
# X-Env-VarRequires: IGconf_network_gateway
# X-Env-VarRequires: IGconf_network_dns0
# X-Env-VarRequires: IGconf_network_dns1
# X-Env-VarRequires: IGconf_network_dns2
# X-Env-VarRequires: IGconf_network_domain
# METAEND
mmdebstrap:
  suite: trixie
  variant: minbase
  customize-hooks:
    - |
      #!/bin/bash
      # Set up network configuration based on environment variables
      INTERFACE=${IGconf_network_interface:?IGconf_network_interface is required}
      USE_DHCP=${IGconf_network_use_dhcp:?IGconf_network_use_dhcp is required}
      IP_ADDRESS=${IGconf_network_ipaddress:?IGconf_network_ipaddress is required}
      NETMASK=${IGconf_network_ipnetmask:?IGconf_network_ipnetmask is required}
      NETMASK_DOTTED=${IGconf_network_netmask:?IGconf_network_netmask is required}
      GATEWAY=${IGconf_network_gateway:?IGconf_network_gateway is required}
      DNS0=${IGconf_network_dns0:?IGconf_network_dns0 is required}
      DNS1=${IGconf_network_dns1:?IGconf_network_dns1 is required}
      DNS2=${IGconf_network_dns2:?IGconf_network_dns2 is required}
      DOMAIN=${IGconf_network_domain:?IGconf_network_domain is required}

      if [ "$USE_DHCP" = "y" ]; then
        DHCP_MODE=yes
      else
        DHCP_MODE=no
      fi

      IFS=. read -r IP_OCTET1 IP_OCTET2 IP_OCTET3 IP_OCTET4 <<-EOF
      $IP_ADDRESS
      EOF
      if [ "$NETMASK" -lt 0 ] || [ "$NETMASK" -gt 32 ]; then
        echo "Invalid NETMASK prefix: $NETMASK" >&2
        exit 1
      fi

      IFS=. read -r MASK_OCTET1 MASK_OCTET2 MASK_OCTET3 MASK_OCTET4 <<-EOF
      $NETMASK_DOTTED
      EOF
      for octet in "$MASK_OCTET1" "$MASK_OCTET2" "$MASK_OCTET3" "$MASK_OCTET4"; do
        if ! echo "$octet" | grep -qE '^[0-9]+$' || [ "$octet" -lt 0 ] || [ "$octet" -gt 255 ]; then
          echo "Invalid dotted netmask octet in IGconf_network_netmask: $NETMASK_DOTTED" >&2
          exit 1
        fi
      done

      MASK_DOTTED_INT=$(( (MASK_OCTET1 << 24) | (MASK_OCTET2 << 16) | (MASK_OCTET3 << 8) | MASK_OCTET4 ))
      DERIVED_PREFIX=0
      MASK_WORK=$MASK_DOTTED_INT
      while [ $(( MASK_WORK & 0x80000000 )) -ne 0 ]; do
        DERIVED_PREFIX=$((DERIVED_PREFIX + 1))
        MASK_WORK=$(((MASK_WORK << 1) & 0xFFFFFFFF))
      done
      if [ "$MASK_WORK" -ne 0 ]; then
        echo "Invalid non-contiguous dotted netmask: $NETMASK_DOTTED" >&2
        exit 1
      fi
      if [ "$DERIVED_PREFIX" -ne "$NETMASK" ]; then
        echo "Mismatched netmask values: IGconf_network_ipnetmask=$NETMASK, IGconf_network_netmask=$NETMASK_DOTTED" >&2
        exit 1
      fi

      IP_INT=$(( (IP_OCTET1 << 24) | (IP_OCTET2 << 16) | (IP_OCTET3 << 8) | IP_OCTET4 ))
      if [ "$NETMASK" -eq 0 ]; then
        MASK_INT=0
      else
        MASK_INT=$(( (0xFFFFFFFF << (32 - NETMASK)) & 0xFFFFFFFF ))
      fi
      NETWORK_INT=$(( IP_INT & MASK_INT ))
      NETWORK_BASE=$(( (NETWORK_INT >> 24) & 255 )).$(( (NETWORK_INT >> 16) & 255 )).$(( (NETWORK_INT >> 8) & 255 )).$(( NETWORK_INT & 255 ))

      # Create systemd network configuration
      install -d "$1/etc/systemd/network"
      cat > "$1/etc/systemd/network/01-$INTERFACE.network" <<-EOF
      # systemd-networkd configuration for $INTERFACE
      # Static IP configuration for Pi-hole DNS server
      # Reference: man systemd.network

      [Match]
      Name=$INTERFACE

      [Network]
      DHCP=$DHCP_MODE

      EOF

      if [ "$DHCP_MODE" = "no" ]; then
        cat >> "$1/etc/systemd/network/01-$INTERFACE.network" <<-EOF

      # Static IP address with CIDR notation
      Address=$IP_ADDRESS/$NETMASK

      # Default gateway
      Gateway=$GATEWAY

      # DNS servers
      # Primary: Localhost (Pi-hole on port 53)
      DNS=$DNS0 
      # Comment out above to let systemd-resolved own global DNS
      # Forcing here to enable further unbound checkings
      # Fallback: additional DNS servers from config
      DNS=$DNS1
      # Only two are supported, three can be shown but will cause warning
      DNS=$DNS2
      EOF
      fi

      cat >> "$1/etc/systemd/network/01-$INTERFACE.network" <<-EOF

      # Disable IPv6 Router Advertisements
      # (IPv6 not currently required for this setup)
      IPv6AcceptRA=no

      # Disable IPv6 link-local addressing
      # (IPv6 not currently required for this setup)
      LinkLocalAddressing=no

      [Link]
      # Wait for this interface to be online before considering boot complete
      RequiredForOnline=yes

      [DHCPv4]
      # DHCP settings (not used with DHCP=no, but documented for reference)
      # UseDNS=no              # Don't use DNS servers from DHCP
      # UseNTP=yes             # Use NTP servers from DHCP
      # UseHostname=no         # Don't use hostname from DHCP

      [Route]
      # Additional static routes can be added here
      # Example:
      # Gateway=192.168.0.1
      # Destination=10.0.0.0/8
      # Metric=100
      EOF

      # Include domain /etc/networks file for proper name resolution
      install -d "$1/etc"
      cat > "$1/etc/networks" <<-EOS
      default		0.0.0.0
      loopback	127.0.0.0
      link-local	169.254.0.0
      $DOMAIN         $NETWORK_BASE
      EOS
    - |
      install -d -m 0755 "$1/etc/systemd/system/ssh.service.d/"
      # Make sure ssh does not register until after the network is online
      # This is necessary when not using 0.0.0.0 for ListenAddress
      cat > "$1/etc/systemd/system/ssh.service.d/override.conf" <<-EOSH
      [Unit]
      After=network-online.target
      Wants=network-online.target
      EOSH
      

