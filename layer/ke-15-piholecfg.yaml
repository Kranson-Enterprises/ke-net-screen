# METABEGIN
# X-Env-Layer-Name: ke-piholecfg
# X-Env-Layer-Desc: Kranson Enterprise Pihole Layer Configuration
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Category: general
# X-Env-Layer-Requires: ke-unbcfg
# METAEND
mmdebstrap:
  suite: trixie
  variant: minbase
  setup-hooks:
    - |
      # Set up a first-boot script to run the Pi-hole installer on first boot
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      install -d -m 0755 "$1/usr/local/sbin" "$1/usr/local/src/pihole-installer"
      install -d -m 0755 "$1/boot/firmware/ke-secrets"

      # Persist the initial Pi-hole password to the boot partition for one-time first-boot use.
      if [ -n "${PIHOLE_PASSWORD:-}" ]; then
        printf '%s\n' "$PIHOLE_PASSWORD" > "$1/boot/firmware/ke-secrets/pihole-admin-password.txt"
      fi

      DNS2=${IGconf_network_dns2:?IGconf_network_dns2 is required}

      # Add local copy of pi-hole installer script
      cp -a "$REPO_ROOT/vendors/pi-hole/automated install/basic-install.sh" "$1/usr/local/src/pihole-installer/" 2>/dev/null || true
      # Keep vendor DNS1 behavior intact and only replace DNS2 to avoid over-constraining upstream fallback.
      sed -i "s/9\.9\.9\.9/$DNS2/g" "$1/usr/local/src/pihole-installer/basic-install.sh" 2>/dev/null || true
      chmod +x "$1/usr/local/src/pihole-installer/basic-install.sh"

      # Create first-boot script to run pi-hole installer
      cat > "$1/usr/local/sbin/run-pihole-firstboot.sh" <<'EOS'
      #!/bin/sh
      set -e
      /usr/local/src/pihole-installer/basic-install.sh --unattended &
      wait $!
      sleep 2
      # disable this service so it doesn't run again
      rm -f /etc/systemd/system/multi-user.target.wants/run-pihole-firstboot.service || true
      systemctl daemon-reload || true
      sleep 2
      systemctl restart systemd-resolved || true
      sleep 2
      systemctl reset-failed || true
      # Read the one-time password from the boot partition, then remove it.
      PIHOLE_PASSWORD_FILE="/boot/firmware/ke-secrets/pihole-admin-password.txt"
      if [ -f "$PIHOLE_PASSWORD_FILE" ]; then
        PIHOLE_PASSWORD_VALUE="$(tr -d '\r\n' < "$PIHOLE_PASSWORD_FILE")"
        if [ -n "$PIHOLE_PASSWORD_VALUE" ]; then
          pihole setpassword "$PIHOLE_PASSWORD_VALUE" || true
        else
          echo "WARN: Pi-hole password file is empty; disabling Pi-hole web password"
          pihole setpassword "" || true
        fi
        rm -f "$PIHOLE_PASSWORD_FILE" || true
        rmdir /boot/firmware/ke-secrets 2>/dev/null || true
      else
        echo "WARN: Pi-hole password file is missing; disabling Pi-hole web password"
        pihole setpassword "" || true
      fi
      python3 /usr/local/src/pihole/import_adlists.py || true
      pihole restartdns reload-lists || true
      pihole -g || true
      pihole networkflush || true
      EOS
      chmod +x "$1/usr/local/sbin/run-pihole-firstboot.sh"

      # Create systemd service to run the first-boot script
      install -d -m 0755 "$1/etc/systemd/system"
      cat > "$1/etc/systemd/system/run-pihole-firstboot.service" <<'EOSVC'
      [Unit]
      Description=Run Pi-hole installer on first boot
      After=systemd-time-wait-sync.service
      Requires=systemd-time-wait-sync.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/run-pihole-firstboot.sh
      AmbientCapabilities=CAP_NET_BIND_SERVICE CAP_RAW_SOCKETS

      [Install]
      WantedBy=multi-user.target
      EOSVC

      # enable the service
      install -d -m 0755 "$1/etc/systemd/system/multi-user.target.wants"
      ln -sf "/etc/systemd/system/run-pihole-firstboot.service" "$1/etc/systemd/system/multi-user.target.wants/run-pihole-firstboot.service"
    - |
      # Copy local pi-hole adlist import script and default adlist CSV
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      install -d -m 0755 "$1/usr/local/src/pihole/"
      cp -a "$REPO_ROOT/home/scripts/pihole/adlists_export.csv" "$1/usr/local/src/pihole/" 2>/dev/null || true
      cp -a "$REPO_ROOT/home/scripts/pihole/import_adlists.py" "$1/usr/local/src/pihole/" 2>/dev/null || true
      chmod +x "$1/usr/local/src/pihole/import_adlists.py"
    - |
      # Copy local pi-hole config files from the repository.
      # These override the default installer settings.
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      PIHOLE_IPV4=${IGconf_network_ipaddress:?IGconf_network_ipaddress is required}

      install -d -m 0755 "$1/etc/pihole/"
      cp -a "$REPO_ROOT/etc/pihole/pihole.toml" "$1/etc/pihole/" 2>/dev/null || true
      # Also copy to the ke-splash location for installed reference
      install -d -m 0755 "$1/usr/local/src/pihole/"
      cp -a "$REPO_ROOT/etc/pihole/pihole.toml" "$1/usr/local/src/pihole/" 2>/dev/null || true
      sed -i "s/\"IGconf_network_ipaddress\"/\"$PIHOLE_IPV4\"/g" "$1/etc/pihole/pihole.toml" "$1/usr/local/src/pihole/pihole.toml"
      chmod 0644 "$1/etc/pihole/pihole.toml"
  cleanup-hooks:
    
