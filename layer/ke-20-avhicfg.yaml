# METABEGIN
# X-Env-Layer-Name: ke-avhicfg
# X-Env-Layer-Desc: Avahi mDNS Configuration
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Category: general
# X-Env-Layer-Requires: ke-piholecfg
# X-Env-VarRequires: IGconf_device_hostname,IGconf_network_ipaddress,IGconf_network_domain
# METAEND
mmdebstrap:
  suite: trixie
  variant: minbase
  packages:
    - avahi-daemon
    - libnss-mdns
  customize-hooks:
    - |
      # Copy Avahi config from repository (single source of truth) and apply placeholders.
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      HOST=${IGconf_device_hostname:?IGconf_device_hostname is required}
      IP_ADDRESS=${IGconf_network_ipaddress:?IGconf_network_ipaddress is required}
      DOMAIN=${IGconf_network_domain:?IGconf_network_domain is required}
      INTERFACE=${IGconf_network_interface:?IGconf_network_interface is required}

      install -d -m 0755 "$1/etc/avahi"
      cp -a "$REPO_ROOT/etc/avahi/avahi-daemon.conf" "$1/etc/avahi/" 2>/dev/null || true
      sed -i \
        -e "s/IGconf_device_hostname/$HOST/g" \
        -e "s/IGconf_network_ipaddress/$IP_ADDRESS/g" \
        -e "s/IGconf_network_interface/$INTERFACE/g" \
        -e "s/IGconf_network_domain/$DOMAIN/g" \
        "$1/etc/avahi/avahi-daemon.conf"
    - |
      # Copy nsswitch from repository to keep one source of truth.
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      cp -a "$REPO_ROOT/etc/nsswitch.conf" "$1/etc/nsswitch.conf"
    - |
      install -d -m 0755 "$1/etc/avahi/services"
      cat > "$1/etc/avahi/services/http.service" <<-EOSHTTP
      <?xml version="1.0" standalone='no'?>
      <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
      <service-group>
        <name replace-wildcards="yes">Pi-hole Server on %h</name>
        <service>
          <type>_http._tcp</type>
          <port>80</port>
        </service>
      </service-group>
      EOSHTTP
    - |
      # Install DNS health checker and run it once after boot, then hourly.
      REPO_ROOT=${SRCROOT:?SRCROOT is required}
      install -d -m 0755 "$1/usr/local/bin"
      cp -a "$REPO_ROOT/home/scripts/monitoring/dns-health-check.sh" "$1/usr/local/bin/dns-health-check.sh" 2>/dev/null || true
      chmod 0755 "$1/usr/local/bin/dns-health-check.sh"

      install -d -m 0755 "$1/etc/systemd/system"
      cat > "$1/etc/systemd/system/dns-health-check.service" <<'EOSVC'
      [Unit]
      Description=DNS stack health check
      Wants=network-online.target
      After=network-online.target pihole-FTL.service unbound.service avahi-daemon.service systemd-resolved.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/dns-health-check.sh

      [Install]
      WantedBy=multi-user.target
      EOSVC

      cat > "$1/etc/systemd/system/dns-health-check.timer" <<'EOTMR'
      [Unit]
      Description=Run DNS stack health checks every hour

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=23h
      Persistent=true

      [Install]
      WantedBy=timers.target
      EOTMR

      install -d -m 0755 "$1/etc/systemd/system/timers.target.wants"
      ln -sf "/etc/systemd/system/dns-health-check.timer" "$1/etc/systemd/system/timers.target.wants/dns-health-check.timer"
  cleanup-hooks: