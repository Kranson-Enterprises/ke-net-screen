# METABEGIN
# X-Env-Layer-Name: ke-avhicfg
# X-Env-Layer-Desc: Avahi mDNS Configuration
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Category: general
# X-Env-Layer-Requires: ke-piholecfg
# X-Env-VarRequires: IGconf_device_hostname,IGconf_network_ipaddress,IGconf_network_domain
# METAEND
mmdebstrap:
  suite: trixie
  variant: minbase
  packages:
    - avahi-daemon
    - libnss-mdns
  customize-hooks:
    - |
      install -d -m 0755 "$1/etc/avahi"
      
      # Set up network configuration based on environment variables
      IP_ADDRESS=${IGconf_network_ipaddress:?IGconf_network_ipaddress is required}
      DOMAIN=${IGconf_network_domain:-lan}
      HOST=${IGconf_device_hostname:-ke-localdns}
      
      cat > "$1/etc/avahi/avahi-daemon.conf" <<-EOS
      # This file is part of avahi.
      #
      # See avahi-daemon.conf(5) for more information on this configuration
      # file!

      [server]
      host-name=$HOST
      domain-name=local
      browse-domains=$DOMAIN
      use-ipv4=yes
      use-ipv6=no
      allow-interfaces=eth0
      #deny-interfaces=eth1
      check-response-ttl=yes
      #use-iff-running=no
      enable-dbus=yes
      disallow-other-stacks=yes
      #allow-point-to-point=no
      cache-entries-max=2048
      clients-max=64
      objects-per-client-max=512
      entries-per-entry-group-max=16
      ratelimit-interval-usec=1000000
      ratelimit-burst=1000

      [wide-area]
      enable-wide-area=yes

      [publish]
      #disable-publishing=no
      #disable-user-service-publishing=no
      #add-service-cookie=no
      publish-addresses=yes
      publish-hinfo=no
      publish-workstation=no
      publish-domain=yes
      #publish-dns-servers=$IP_ADDRESS
      publish-resolv-conf-dns-servers=no
      publish-aaaa-on-ipv4=no
      publish-a-on-ipv6=no

      [reflector]
      enable-reflector=no
      reflect-ipv=yes
      reflect-filters=_airplay._tcp.local,_raop._tcp.local

      [rlimits]
      #rlimit-as=
      #rlimit-core=0
      #rlimit-data=8388608
      #rlimit-fsize=0
      #rlimit-nofile=768
      #rlimit-stack=8388608
      #rlimit-nproc=3
      EOS
    - |
      # Set up custom nsswitch.conf to prioritize mDNS resolution
      cat > "$1/etc/nsswitch.conf" <<'EOTC'
      # /etc/nsswitch.conf
      #
      # BKR: Network security and performance tuned

      passwd:         files
      group:          files
      shadow:         files
      gshadow:        files

      hosts: mymachines resolve [!UNAVAIL=return] files myhostname mdns4_minimal [NOTFOUND=return] dns
      networks:       files

      protocols:      db files
      services:       db files
      ethers:         db files
      rpc:            db files

      netgroup:       nis
      EOTC
    - |
      install -d -m 0755 "$1/etc/avahi/services"
      cat > "$1/etc/avahi/services/http.service" <<-EOSHTTP
      <?xml version="1.0" standalone='no'?>
      <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
      <service-group>
        <name replace-wildcards="yes">Pi-hole Server on %h</name>
        <service>
          <type>_http._tcp</type>
          <port>80</port>
        </service>
      </service-group>    
      EOSHTTP
    - |
      # Install DNS health checker and run it once after boot, then hourly.
      install -d -m 0755 "$1/usr/local/bin"
      cp -a "../ke-net-screen/home/scripts/monitoring/dns-health-check.sh" "$1/usr/local/bin/dns-health-check.sh" 2>/dev/null || true
      chmod 0755 "$1/usr/local/bin/dns-health-check.sh"

      install -d -m 0755 "$1/etc/systemd/system"
      cat > "$1/etc/systemd/system/dns-health-check.service" <<'EOSVC'
      [Unit]
      Description=DNS stack health check
      Wants=network-online.target
      After=network-online.target pihole-FTL.service unbound.service avahi-daemon.service systemd-resolved.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/dns-health-check.sh

      [Install]
      WantedBy=multi-user.target
      EOSVC

      cat > "$1/etc/systemd/system/dns-health-check.timer" <<'EOTMR'
      [Unit]
      Description=Run DNS stack health checks every hour

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target
      EOTMR

      install -d -m 0755 "$1/etc/systemd/system/timers.target.wants"
      ln -sf "/etc/systemd/system/dns-health-check.timer" "$1/etc/systemd/system/timers.target.wants/dns-health-check.timer"
  cleanup-hooks: